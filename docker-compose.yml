services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: datn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/datn
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-ZGVtby1zZWNyZXQta2V5LWRlbW8tc2VjcmV0LWtleS1kZW1vLXNlY3JldC1rZXk=}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173,http://localhost:8080
    depends_on:
      - db
    ports:
      - "8082:8082"

  fe:
    build:
      context: ./demo
      dockerfile: Dockerfile
      args:
        # Bắt buộc lúc build (Vite embed URL API vào bundle)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8082}
    ports:
      - "8080:80"
    depends_on:
      - be

volumes:
  pgdata:

