services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: datn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/datn
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-ZGVtby1zZWNyZXQta2V5LWRlbW8tc2VjcmV0LWtleS1kZW1vLXNlY3JldC1rZXk=}
      # FE dev (demo :5173, demo_2 :5174) + preview; thêm 127.0.0.1 vì một số trình duyệt dùng host đó
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4174,http://127.0.0.1:4174,http://localhost:8080,http://127.0.0.1:8080
      APP_AI_SERVICE_ENABLED: "true"
      APP_AI_SERVICE_BASE_URL: http://ai-service:8090
    depends_on:
      - db
      - ai-service
    ports:
      - "8082:8082"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8090:8090"

  fe:
    build:
      context: ./demo
      dockerfile: Dockerfile
      args:
        # Bắt buộc lúc build (Vite embed URL API vào bundle)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8082}
    ports:
      - "8080:80"
    depends_on:
      - be

volumes:
  pgdata:

