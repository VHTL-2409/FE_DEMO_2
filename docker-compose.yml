services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: datn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Ho_Chi_Minh
      BE_DOTENV_FILE: /app/.env
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/datn
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:4173,http://127.0.0.1:4173,http://localhost:4174,http://127.0.0.1:4174,http://localhost:8080,http://127.0.0.1:8080
      APP_AI_SERVICE_ENABLED: "true"
      APP_AI_SERVICE_BASE_URL: http://ai-service:8090
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      python-parser:
        condition: service_healthy
    ports:
      - "8082:8082"
    mem_limit: 1g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./BE/.env:/app/.env:ro

  python-parser:
    build:
      context: ./python_parser
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - python-parser-temp:/tmp
    mem_limit: 512m
    mem_reservation: 256m
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-${OPENAI_API_KEY:-}}
      APP_AI_MODEL: ${APP_AI_MODEL:-gpt-4o-mini}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      APP_AI_MODEL_KEYS_FILE: ${APP_AI_MODEL_KEYS_FILE:-}
      APP_AI_MODEL_KEYS_JSON: ${APP_AI_MODEL_KEYS_JSON:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    volumes:
      - ./secrets:/run/secrets:ro
    ports:
      - "8090:8090"
    mem_limit: 512m
    mem_reservation: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - app-network

  fe:
    build:
      context: ./demo
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8082}
    ports:
      - "8080:80"
    depends_on:
      be:
        condition: service_healthy
    mem_limit: 128m
    mem_reservation: 64m
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  python-parser-temp:
