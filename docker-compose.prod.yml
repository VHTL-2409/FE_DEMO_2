# Production - chạy với: docker compose -f docker-compose.prod.yml up -d
# Cần file .env với các biến: SPRING_DATASOURCE_PASSWORD, SECURITY_JWT_SECRET, ...
#
# Publish: mặc định FE :8080, BE :8082 trên mọi interface (truy cập được từ ngoài).
# Có Nginx host reverse-proxy: trong .env đặt DOCKER_FE_PUBLISH=127.0.0.1:8080 và DOCKER_BE_PUBLISH=127.0.0.1:8082
# Xem deploy/nginx-host-81-444.conf.example

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: datn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datn"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Giảm RAM mặc định của Postgres trên VPS nhỏ (tùy chỉnh thêm nếu cần)
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=40
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Ho_Chi_Minh
      BE_DOTENV_FILE: /run/secrets/be.env
      # JVM: heap ~70% của mem_limit container (đổi trong .env: JAVA_TOOL_OPTIONS=...)
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0 -XX:+UseStringDeduplication"
      HIKARI_MAX_POOL: ${HIKARI_MAX_POOL:-12}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE:-1}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/datn
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:8082,http://localhost:8082,https://localhost:443,https://test1.nexquoteapp.com}
      APP_AI_SERVICE_ENABLED: ${APP_AI_SERVICE_ENABLED:-true}
      APP_AI_SERVICE_BASE_URL: ${APP_AI_SERVICE_BASE_URL:-http://ai-service:8090}
      SPRING_JPA_SHOW_SQL: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "${DOCKER_BE_PUBLISH:-8082}:8082"
    # Trần RAM cho container BE — JVM + native; chỉnh 512m–768m nếu VPS rất nhỏ
    mem_limit: ${BE_MEM_LIMIT:-768m}
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./BE/.env:/run/secrets/be.env:ro

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APP_AI_API_KEY: ${APP_AI_API_KEY:-${OPENAI_API_KEY:-}}
      APP_AI_MODEL: ${APP_AI_MODEL:-gpt-4o-mini}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      APP_AI_MODEL_KEYS_FILE: ${APP_AI_MODEL_KEYS_FILE:-}
      APP_AI_MODEL_KEYS_JSON: ${APP_AI_MODEL_KEYS_JSON:-}
    volumes:
      - ./secrets:/run/secrets:ro
    ports:
      - "${DOCKER_AI_SERVICE_PUBLISH:-127.0.0.1:8090}:8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: ${AI_SERVICE_MEM_LIMIT:-512m}
    networks:
      - app-network

  python-parser:
    build:
      context: ./python_parser
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_PYTHON_PARSER_PUBLISH:-127.0.0.1:8000}:8000"
    volumes:
      - python-parser-temp:/tmp
    restart: "no"
    networks:
      - app-network

  fe:
    build:
      context: ./demo
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${DOCKER_FE_PUBLISH:-444}:80"
    depends_on:
      be:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/root/FE_DEMO/ssl:ro

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  python-parser-temp:
