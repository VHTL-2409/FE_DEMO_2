# Production - chạy với: docker compose -f docker-compose.prod.yml up -d
# Cần file .env.production với các biến: SPRING_DATASOURCE_PASSWORD, SECURITY_JWT_SECRET, ...

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: datn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-123}
    # Giảm RAM mặc định của Postgres trên VPS nhỏ (tùy chỉnh thêm nếu cần)
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=40
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  be:
    build:
      context: ./BE
      dockerfile: Dockerfile
    environment:
      TZ: Asia/Ho_Chi_Minh
      # JVM: heap ~70% của mem_limit container (đổi trong .env: JAVA_TOOL_OPTIONS=...)
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0 -XX:+UseStringDeduplication"
      HIKARI_MAX_POOL: ${HIKARI_MAX_POOL:-6}
      HIKARI_MIN_IDLE: ${HIKARI_MIN_IDLE:-1}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/datn
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-123}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-ZGVtby1zZWNyZXQta2V5LWRlbW8tc2VjcmV0LWtleS1kZW1vLXNlY3JldC1rZXk=}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://127.0.0.1:8080}
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      - db
    ports:
      - "8082:8082"
    # Trần RAM cho container BE — JVM + native; chỉnh 512m–768m nếu VPS rất nhỏ
    mem_limit: ${BE_MEM_LIMIT:-768m}
    restart: unless-stopped
    
  fe:
    build:
      context: ./demo
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8082}
    ports:
      - "8080:80"
    depends_on:
      - be
    restart: unless-stopped

volumes:
  pgdata:
