# =============================================================================
# Nginx Host Reverse Proxy — test1.nexquoteapp.com:444
# =============================================================================
# Hướng dẫn cài đặt:
# 1. Copy file này vào server Linux
# 2. sudo cp nginx-host-test1.conf /etc/nginx/sites-available/test1.nexquoteapp.com
# 3. sudo ln -sf /etc/nginx/sites-available/test1.nexquoteapp.com /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx
#
# Yêu cầu:
# - SSL Certificate tại: /etc/letsencrypt/live/test1.nexquoteapp.com/
# - Docker đã chạy với: DOCKER_FE_PUBLISH=127.0.0.1:8080, DOCKER_BE_PUBLISH=127.0.0.1:8082
# =============================================================================

# HTTP :81 — redirect sang HTTPS :444
server {
    listen 81;
    listen [::]:81;
    server_name test1.nexquoteapp.com;

    location / {
        return 301 https://$host:444$request_uri;
    }
}

# HTTPS :444 — site chính
server {
    listen 444 ssl http2 default_server;
    listen [::]:444 ssl http2 default_server;
    server_name test1.nexquoteapp.com;

    ssl_certificate /etc/letsencrypt/live/test1.nexquoteapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test1.nexquoteapp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers for frontend
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'" always;

    # Giao diện frontend (Docker FE container:80)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 444;
    }

    # API backend (Docker BE container:8082)
    location /api {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 444;
    }

    # WebSocket cho Spring (STOMP)
    location /ws {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Note: limit_req_zone must be in http {} context — ensure this file is included inside
# an http {} block that defines: limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
# Then apply with: limit_req zone=api_limit burst=50 nodelay; in desired location blocks.
