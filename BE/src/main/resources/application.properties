spring.application.name=demo
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP — pool gọn, timeout hợp lý cho API
spring.datasource.hikari.pool-name=ExamHikariPool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:12}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:400}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:4096}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:200}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
# Mặc định tắt SQL log (CPU + I/O). Bật debug: SPRING_JPA_SHOW_SQL=true
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
# Đóng OSIV: tránh giữ session suốt request; service layer tự @Transactional / fetch rõ ràng
spring.jpa.open-in-view=false
# Batch insert/update + giảm N+1 cho collection lazy
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

security.jwt.secret=${SECURITY_JWT_SECRET:ZGVtby1zZWNyZXQta2V5LWRlbW8tc2VjcmV0LWtleS1kZW1vLXNlY3JldC1rZXk=}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

# Tài khoản admin mặc định (chỉ tạo khi chưa có user cùng username). Trên VPS nên đặt DEMO_ADMIN_PASSWORD trong .env
demo.bootstrap.admin.username=${DEMO_ADMIN_USERNAME:admin}
demo.bootstrap.admin.password=${DEMO_ADMIN_PASSWORD:123456}

demo.risk.level.suspicious-min=31
demo.risk.level.high-risk-min=61
demo.risk.level.critical-min=81
demo.risk.snapshots.interval-seconds=60
demo.risk.snapshots.min-delta=5
demo.risk.weight.tab-switch=0.5
demo.risk.cap.tab-switch=30
demo.risk.weight.window-blur=0.4
demo.risk.cap.window-blur=25
demo.risk.weight.exit-fullscreen=0.75
demo.risk.cap.exit-fullscreen=40
demo.risk.weight.copy-paste=0.8
demo.risk.cap.copy-paste=40
demo.risk.weight.idle-time=0.3
demo.risk.cap.idle-time=20
demo.risk.weight.devtools-open=0.9
demo.risk.cap.devtools-open=60
demo.risk.weight.right-click=0.35
demo.risk.cap.right-click=15
demo.risk.weight.print-screen=0.85
demo.risk.cap.print-screen=45
demo.risk.weight.rapid-question-switch=0.6
demo.risk.cap.rapid-question-switch=30
demo.risk.weight.multi-monitor=0.85
demo.risk.cap.multi-monitor=45
demo.risk.weight.duplicate-ip=0.7
demo.risk.cap.duplicate-ip=45
demo.risk.weight.time-anomaly=0.65
demo.risk.cap.time-anomaly=40
demo.risk.weight.heartbeat-stale=0.7
demo.risk.cap.heartbeat-stale=35
demo.risk.weight.device-fingerprint-changed=0.95
demo.risk.cap.device-fingerprint-changed=70
demo.risk.weight.default=0.5
demo.risk.cap.default=25

demo.monitoring.events.rate-limit.window-seconds=10
demo.monitoring.events.rate-limit.max=25
demo.monitoring.duplicate-ip-cooldown-seconds=120
demo.monitoring.integrity-check.cooldown-seconds=45
demo.proctoring.events.dedupe-seconds=5
demo.proctoring.heartbeat.stale-seconds=90
demo.proctoring.heartbeat.stale-cooldown-seconds=120
demo.proctoring.fullscreen.exit-cooldown-seconds=30
demo.websocket.broker.mode=${DEMO_WEBSOCKET_BROKER_MODE:simple}
demo.websocket.simple-broker.heartbeat-ms=${DEMO_WEBSOCKET_SIMPLE_HEARTBEAT_MS:10000}
demo.websocket.relay.host=${DEMO_WEBSOCKET_RELAY_HOST:localhost}
demo.websocket.relay.port=${DEMO_WEBSOCKET_RELAY_PORT:61613}
demo.websocket.relay.client-login=${DEMO_WEBSOCKET_RELAY_CLIENT_LOGIN:guest}
demo.websocket.relay.client-passcode=${DEMO_WEBSOCKET_RELAY_CLIENT_PASSCODE:guest}
demo.websocket.relay.system-login=${DEMO_WEBSOCKET_RELAY_SYSTEM_LOGIN:guest}
demo.websocket.relay.system-passcode=${DEMO_WEBSOCKET_RELAY_SYSTEM_PASSCODE:guest}
demo.websocket.relay.virtual-host=${DEMO_WEBSOCKET_RELAY_VIRTUAL_HOST:/}
demo.websocket.transport.message-size-limit-bytes=${DEMO_WEBSOCKET_MESSAGE_SIZE_LIMIT_BYTES:65536}
demo.websocket.transport.send-time-limit-ms=${DEMO_WEBSOCKET_SEND_TIME_LIMIT_MS:15000}
demo.websocket.transport.send-buffer-size-limit-bytes=${DEMO_WEBSOCKET_SEND_BUFFER_SIZE_LIMIT_BYTES:524288}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Production: đặt APP_CORS_ALLOWED_ORIGINS trong .env (vd: https://ten-mien.com,https://www.ten-mien.com)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

# Mail (quên mật khẩu, xác minh email) - profile gmail chạy mặc định khi có SPRING_MAIL_USERNAME
spring.profiles.active=${SPRING_PROFILES_ACTIVE:gmail}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
app.mail.from=${APP_MAIL_FROM:noreply@examportal.edu}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}

# AI phân tích độ khó câu hỏi khi import (OpenAI hoặc tương thích)
app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.endpoint=${APP_AI_ENDPOINT:https://api.openai.com/v1/chat/completions}
app.ai.model=${APP_AI_MODEL:gpt-4o-mini}
app.ai.timeout-ms=${APP_AI_TIMEOUT_MS:15000}

# Python OCR / proctoring sidecar
app.ai-service.enabled=${APP_AI_SERVICE_ENABLED:false}
app.ai-service.base-url=${APP_AI_SERVICE_BASE_URL:http://localhost:8090}
app.ai-service.timeout-ms=${APP_AI_SERVICE_TIMEOUT_MS:20000}

server.forward-headers-strategy=framework
# Nén JSON/HTML khi client hỗ trợ (giảm băng thông)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/json,application/javascript,application/xml

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Log file: logs/application.log (full), logs/error.log (chỉ lỗi). Đổi thư mục: LOG_PATH=./my-logs
logging.file.path=logs
