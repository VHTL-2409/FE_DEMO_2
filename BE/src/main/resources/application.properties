spring.application.name=demo
server.port=8082

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/datn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.serialization.fail-on-empty-beans=false

security.jwt.secret=${SECURITY_JWT_SECRET:ZGVtby1zZWNyZXQta2V5LWRlbW8tc2VjcmV0LWtleS1kZW1vLXNlY3JldC1rZXk=}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

demo.risk.threshold=8
demo.risk.tab-switch=2
demo.risk.blur=1
demo.risk.exit-fullscreen=3
demo.risk.fast-submit=5
demo.risk.duplicate-ip=4
demo.risk.copy-paste=2
demo.risk.idle-time=1
demo.risk.devtools-open=3

demo.risk.compound.multiplier=1.5
demo.risk.compound.reset-minutes=10
demo.risk.burst.window-seconds=30
demo.risk.burst.threshold=6
demo.risk.burst.multiplier=1.15
demo.risk.progress.fast-submit.early-multiplier=1.5

demo.monitoring.events.rate-limit.window-seconds=10
demo.monitoring.events.rate-limit.max=25
demo.monitoring.duplicate-ip-cooldown-seconds=120

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173

# AI phân tích độ khó câu hỏi khi import (OpenAI hoặc tương thích)
app.ai.enabled=${APP_AI_ENABLED:false}
app.ai.api-key=${APP_AI_API_KEY:}
app.ai.endpoint=${APP_AI_ENDPOINT:https://api.openai.com/v1/chat/completions}
app.ai.model=${APP_AI_MODEL:gpt-4o-mini}
app.ai.timeout-ms=${APP_AI_TIMEOUT_MS:15000}

server.forward-headers-strategy=framework

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
