# Nạp .env (dự phòng): WorkspaceDotenvEnvironmentPostProcessor cũng đọc BE/.env + .env theo user.dir
spring.config.import=optional:file:.env,optional:file:BE/.env

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/datn}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP - pool gọn, timeout hợp lý cho API
spring.datasource.hikari.pool-name=ExamHikariPool
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:12}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:400}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:4096}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:200}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:schema.sql
# Mặc định tắt SQL log (CPU + I/O). Bật debug: SPRING_JPA_SHOW_SQL=true
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
# Đóng OSIV: tránh giữ session suốt request; service layer tự @Transactional / fetch rõ ràng
spring.jpa.open-in-view=false
# Batch insert/update + giảm N+1 cho collection lazy
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.timezone=Asia/Ho_Chi_Minh
app.proctor.evidence-image-dir=${APP_PROCTOR_EVIDENCE_IMAGE_DIR:${user.dir}/data/proctor-evidence}
app.proctor.evidence-image-url-prefix=${APP_PROCTOR_EVIDENCE_IMAGE_URL_PREFIX:/evidence-images}

security.jwt.secret=${SECURITY_JWT_SECRET:CHANGE_ME_in_env}
# Access token: 1 giờ. Môi trường production nên đặt SECURITY_JWT_EXPIRATION_MS.
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:3600000}
# Refresh token: 7 ngày
app.jwt.refresh-expiration-days=${APP_JWT_REFRESH_EXPIRATION_DAYS:7}
# Các claim của JWT
app.jwt.issuer=${APP_JWT_ISSUER:eduexam}
app.jwt.audience=${APP_JWT_AUDIENCE:eduexam-client}

# Tài khoản admin mặc định (chỉ tạo khi chưa có user cùng username). Trên VPS nên đặt DEMO_ADMIN_PASSWORD trong .env
demo.bootstrap.admin.username=${DEMO_ADMIN_USERNAME:admin}
demo.bootstrap.admin.password=${DEMO_ADMIN_PASSWORD:CHANGE_ME_in_env}

