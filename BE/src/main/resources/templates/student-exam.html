<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Exam</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        input, button, select, textarea { width: 100%; padding: 8px; margin: 4px 0; }
        pre { background: #f6f6f6; padding: 8px; max-height: 280px; overflow: auto; }
    </style>
</head>
<body>
<h2>Student Exam Page</h2>
<p>Current user: <span id="username"></span> <button onclick="logout()">Logout</button></p>

<div class="card">
    <h3>Step 1: Start Attempt</h3>
    <input id="examId" type="number" placeholder="Exam ID" value="1" />
    <button onclick="startAttempt()">Start</button>
    <div>Attempt ID: <span id="attemptId"></span></div>
</div>

<div class="card">
    <h3>Step 2: Load Questions</h3>
    <button onclick="loadQuestions()">Load Questions</button>
    <pre id="questions"></pre>
</div>

<div class="card">
    <h3>Step 3: Fill answers quickly</h3>
    <button onclick="generateSampleAnswers()">Generate from loaded questions</button>
</div>

<div class="card">
    <h3>Step 4: Submit Answers (JSON)</h3>
    <textarea id="answersJson" rows="8" placeholder='[{"questionId":1,"selectedAnswer":"A"}]'></textarea>
    <button onclick="submitAttempt()">Submit</button>
    <pre id="submitResult"></pre>
</div>

<div class="card">
    <h3>My Attempts</h3>
    <button onclick="loadMyAttempts()">Load My Attempts</button>
    <pre id="myAttempts"></pre>
</div>

<div class="card">
    <h3>Monitoring Events</h3>
    <select id="eventType">
        <option>TAB_SWITCH</option>
        <option>BLUR</option>
        <option>EXIT_FULLSCREEN</option>
        <option>FAST_SUBMIT</option>
        <option>DUPLICATE_IP</option>
    </select>
    <input id="eventDetails" placeholder="details" />
    <button onclick="sendEvent()">Send Event</button>
</div>

<script>
const token = localStorage.getItem('token');
const username = localStorage.getItem('username');
const roles = JSON.parse(localStorage.getItem('roles') || '[]');
if (!token) window.location.href = '/login';
if (roles.includes('TEACHER') || roles.includes('ADMIN')) window.location.href = '/web/teacher';
document.getElementById('username').textContent = username || 'unknown';
let loadedQuestions = [];

function authHeaders(extra = {}) {
    return Object.assign({ 'Authorization': 'Bearer ' + token }, extra);
}

async function startAttempt() {
    const examId = document.getElementById('examId').value;
    const res = await fetch(`/api/exams/${examId}/attempts/start`, {
        method: 'POST',
        headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Start failed');
        return;
    }
    document.getElementById('attemptId').textContent = data.attemptId;
}

async function loadQuestions() {
    const examId = document.getElementById('examId').value;
    const res = await fetch(`/api/exams/${examId}/questions`, { headers: authHeaders() });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Load questions failed');
        return;
    }
    loadedQuestions = Array.isArray(data) ? data : [];
    document.getElementById('questions').textContent = JSON.stringify(data, null, 2);
}

function generateSampleAnswers() {
    if (!loadedQuestions.length) {
        alert('Load questions first');
        return;
    }
    const answers = loadedQuestions.map(q => ({ questionId: q.id, selectedAnswer: 'A' }));
    document.getElementById('answersJson').value = JSON.stringify(answers, null, 2);
}

async function submitAttempt() {
    const attemptId = document.getElementById('attemptId').textContent;
    if (!attemptId) {
        alert('Start attempt first');
        return;
    }
    let answers;
    try {
        answers = JSON.parse(document.getElementById('answersJson').value || '[]');
    } catch (e) {
        alert('Invalid JSON');
        return;
    }

    const res = await fetch(`/api/attempts/${attemptId}/submit`, {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ answers })
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Submit failed');
        return;
    }
    document.getElementById('submitResult').textContent = JSON.stringify(data, null, 2);
    await loadMyAttempts();
}

async function loadMyAttempts() {
    const res = await fetch('/api/attempts/my', { headers: authHeaders() });
    const data = await res.json();
    document.getElementById('myAttempts').textContent = JSON.stringify(data, null, 2);
}

async function sendEvent() {
    const attemptId = document.getElementById('attemptId').textContent;
    if (!attemptId) {
        alert('Start attempt first');
        return;
    }
    const body = {
        eventType: document.getElementById('eventType').value,
        details: document.getElementById('eventDetails').value
    };
    const res = await fetch(`/api/attempts/${attemptId}/monitoring/events`, {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Event failed');
        return;
    }
    alert('Risk score: ' + data.riskScore + ' | suspicious: ' + data.suspicious);
}

function logout() {
    localStorage.clear();
    window.location.href = '/login';
}
</script>
</body>
</html>
