<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
        input, textarea, button, select { width: 100%; padding: 8px; margin: 4px 0; }
        pre { background: #f6f6f6; padding: 8px; max-height: 260px; overflow: auto; }
        .alert { color: #b00020; font-weight: bold; }
    </style>
</head>
<body>
<h2>Teacher Dashboard</h2>
<p>Current user: <span id="username"></span> <button onclick="logout()">Logout</button></p>

<div class="grid">
    <div class="card">
        <h3>Create Exam</h3>
        <input id="examTitle" placeholder="Title" />
        <textarea id="examDescription" placeholder="Description"></textarea>
        <input id="examDuration" type="number" placeholder="Duration minutes" value="30" />
        <button onclick="createExam()">Create</button>
    </div>

    <div class="card">
        <h3>Import Questions (XLSX)</h3>
        <input id="importExamId" type="number" placeholder="Exam ID" />
        <input id="xlsxFile" type="file" accept=".xlsx" />
        <button onclick="importXlsx()">Import</button>
    </div>
</div>

<div class="card">
    <h3>Exams</h3>
    <button onclick="loadExams()">Reload Exams</button>
    <pre id="exams"></pre>
</div>

<div class="card">
    <h3>Exam Questions</h3>
    <input id="questionsExamId" type="number" placeholder="Exam ID" />
    <button onclick="loadQuestionsByExam()">Load Questions</button>
    <pre id="questions"></pre>
</div>

<div class="card">
    <h3>Exam Attempts</h3>
    <input id="attemptExamId" type="number" placeholder="Exam ID" />
    <button onclick="loadAttemptsByExam()">Load Attempts</button>
    <pre id="attempts"></pre>
</div>

<div class="card">
    <h3>Suspicious Alerts (Realtime)</h3>
    <div id="alerts" class="alert"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
const token = localStorage.getItem('token');
const username = localStorage.getItem('username');
const roles = JSON.parse(localStorage.getItem('roles') || '[]');

document.getElementById('username').textContent = username || 'unknown';
if (!token) window.location.href = '/login';
if (!(roles.includes('TEACHER') || roles.includes('ADMIN'))) window.location.href = '/web/student';

function authHeaders(extra = {}) {
    return Object.assign({ 'Authorization': 'Bearer ' + token }, extra);
}

async function createExam() {
    const body = {
        title: document.getElementById('examTitle').value,
        description: document.getElementById('examDescription').value,
        durationMinutes: parseInt(document.getElementById('examDuration').value || '30', 10),
        isActive: true
    };
    const res = await fetch('/api/exams', {
        method: 'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Create exam failed');
        return;
    }
    if (data.id) {
        document.getElementById('importExamId').value = data.id;
        document.getElementById('questionsExamId').value = data.id;
        document.getElementById('attemptExamId').value = data.id;
    }
    await loadExams();
}

async function loadExams() {
    const res = await fetch('/api/exams', { headers: authHeaders() });
    const data = await res.json();
    document.getElementById('exams').textContent = JSON.stringify(data, null, 2);
}

async function importXlsx() {
    const examId = document.getElementById('importExamId').value;
    const fileInput = document.getElementById('xlsxFile');
    if (!examId || !fileInput.files.length) {
        alert('Select examId and .xlsx file');
        return;
    }
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const res = await fetch('/api/exams/' + examId + '/questions/import-xlsx', {
        method: 'POST',
        headers: authHeaders(),
        body: formData
    });
    const data = await res.json();
    if (!res.ok) {
        alert(data.message || 'Import failed');
        return;
    }
    alert('Imported: ' + data.importedCount);
    await loadQuestionsByExam();
}

async function loadQuestionsByExam() {
    const examId = document.getElementById('questionsExamId').value;
    if (!examId) {
        alert('Enter exam ID');
        return;
    }
    const res = await fetch('/api/exams/' + examId + '/questions', { headers: authHeaders() });
    const data = await res.json();
    document.getElementById('questions').textContent = JSON.stringify(data, null, 2);
}

async function loadAttemptsByExam() {
    const examId = document.getElementById('attemptExamId').value;
    if (!examId) {
        alert('Enter exam ID');
        return;
    }
    const res = await fetch('/api/exams/' + examId + '/attempts', { headers: authHeaders() });
    const data = await res.json();
    document.getElementById('attempts').textContent = JSON.stringify(data, null, 2);
}

function connectAlerts() {
    const sock = new SockJS('/ws');
    const client = Stomp.over(sock);
    client.connect({}, function() {
        client.subscribe('/topic/teacher-alerts', function(message) {
            const payload = JSON.parse(message.body);
            const el = document.getElementById('alerts');
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] attempt=${payload.attemptId} student=${payload.student} risk=${payload.riskScore}`;
            el.prepend(line);
        });
    });
}

function logout() {
    localStorage.clear();
    window.location.href = '/login';
}

loadExams();
connectAlerts();
</script>
</body>
</html>
