# Gmail SMTP - dùng biến môi trường SPRING_MAIL_USERNAME, SPRING_MAIL_PASSWORD
# Cần App Password (không dùng mật khẩu đăng nhập): https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# From: ưu tiên APP_MAIL_FROM, nếu không có thì dùng SPRING_MAIL_USERNAME (Gmail yêu cầu trùng)
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:noreply@examportal.edu}}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
