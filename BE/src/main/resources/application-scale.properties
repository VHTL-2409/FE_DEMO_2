# Production scaling configuration
# Use with: SPRING_PROFILES_ACTIVE=scale

# Database connection pool - scale up for high traffic
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# Tomcat threads - more concurrent connections
server.tomcat.threads.max=800
server.tomcat.max-connections=8192
server.tomcat.accept-count=400

# JPA - larger batches for bulk operations
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.default_batch_fetch_size=32

# WebSocket - higher limits
demo.websocket.transport.send-buffer-size-limit-bytes=1048576

# Actuator - expose metrics without requiring a Prometheus registry dependency
management.endpoints.web.exposure.include=health,info,metrics,loggers

# Logging
logging.level.root=INFO
logging.level.com.example.demo=INFO
