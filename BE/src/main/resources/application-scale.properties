# Cấu hình mẫu cho quy mô lớn (nhiều bài thi × 1000 thí sinh)
# Sử dụng: spring.profiles.include=scale hoặc -Dspring.profiles.active=scale

# ========== Database connection pool ==========
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========== Tomcat (HTTP + WebSocket) ==========
server.tomcat.threads.max=500
server.tomcat.max-connections=2000
server.tomcat.accept-count=500

# ========== Monitoring - có thể nới lỏng nếu cần ==========
# demo.monitoring.events.rate-limit.max=30
